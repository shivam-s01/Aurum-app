name: Build Aurum Music APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/aurum-release.jks

      - name: Write key.properties
        run: |
          printf 'storePassword=${{ secrets.STORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=aurum-release.jks\n' > android/key.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze (safety gate — stops here on real errors)
        run: flutter analyze --no-fatal-infos

      - name: Set build number from run number
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//' | tr -d '\r')
          NEW_VERSION="${BASE_VERSION}+${{ github.run_number }}"
          sed -i "s/^version:.*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "Set pubspec.yaml version to ${NEW_VERSION}"

      - name: Build Release APK
        run: flutter build apk --release

      - name: Get version
        id: ver
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '\r')
          BUILD=$(echo $VERSION | cut -d'+' -f2)
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aurum-music-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Check release opt-in
        id: release_gate
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"[release]"* ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Commit message doesn't contain [release] — build artifact is available above, but no public release was created. Nobody's app will be prompted to update from this run."
          fi

      - name: Create Release
        if: steps.release_gate.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build${{ steps.ver.outputs.build }}
          name: Build ${{ steps.ver.outputs.build }}
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
