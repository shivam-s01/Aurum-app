name: Build Aurum Music APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Build split APKs (per ABI)
        run: flutter build apk --release --split-per-abi --no-shrink

      - name: Rename APKs
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/aurum-music.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk output/aurum-music-arm64.apk || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk output/aurum-music-arm32.apk || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk output/aurum-music-x64.apk || true

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: aurum-music-apk
          path: output/aurum-music.apk
          retention-days: 30

      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: aurum-music-split-apks
          path: output/aurum-music-*.apk
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/aurum-music.apk
            output/aurum-music-arm64.apk
            output/aurum-music-arm32.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
