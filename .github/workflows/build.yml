name: Build Aurum Music APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/aurum-release.jks

      - name: Print Keystore SHA-1 (for Google Cloud Console OAuth client)
        run: |
          keytool -list -v \
            -keystore android/app/aurum-release.jks \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -storepass "${{ secrets.STORE_PASSWORD }}" \
            | grep -A1 "SHA1:"

      - name: Write key.properties
        run: |
          printf 'storePassword=${{ secrets.STORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=aurum-release.jks\n' > android/key.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Set build number
        id: ver
        run: |
          # Build number = GitHub run number → always unique & always
          # increasing, never depends on remembering to bump pubspec.yaml.
          # update_service.dart compares against this number, so it can
          # never go stale or collide with an existing release tag.
          BUILD=${{ github.run_number }}
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '\r')
          sed -i "s/^version: .*/version: $VERSION_NAME+$BUILD/" pubspec.yaml
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aurum-music-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build${{ steps.ver.outputs.build }}
          name: Build ${{ steps.ver.outputs.build }}
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
