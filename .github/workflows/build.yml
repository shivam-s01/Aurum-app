name: Build Aurum Music APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/aurum-release.jks
          echo "Keystore size: $(wc -c < android/app/aurum-release.jks) bytes"

      - name: Write key.properties
        run: |
          cat > android/key.properties << PROPS
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/aurum-release.jks
          PROPS
          echo "key.properties written:"
          cat android/key.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/Aurum-Music-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aurum-Music-APK
          path: build/app/outputs/flutter-apk/Aurum-Music-release.apk
          retention-days: 30
