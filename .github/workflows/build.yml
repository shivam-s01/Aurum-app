name: Build Aurum Music APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/aurum-release.jks

      - name: Write key.properties
        run: |
          printf 'storePassword=${{ secrets.STORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=aurum-release.jks\n' > android/key.properties

      - name: Get dependencies
        run: flutter pub get

      # FIX: this workflow used to read the build number straight out of
      # pubspec.yaml, which only changes when someone manually edits it.
      # Every regular code push (bug fixes, UI tweaks, etc.) left pubspec.yaml's
      # version untouched, so this step kept computing the SAME build number
      # as the previous release. The "Create Release" step below then tried
      # to publish to the SAME tag every time — overwriting the prior
      # release's asset in place rather than creating a new one. From the
      # app's point of view, UpdateService.checkForUpdate() compares the
      # GitHub release's build number against the number baked into the
      # currently-installed APK; if they're equal (which they always were,
      # since the tag never changed) `latestBuild <= currentBuild` is true
      # and the function returns immediately — the "Update Available"
      # popup silently never appears, even though a brand new APK with all
      # the latest fixes really had just been built and uploaded.
      #
      # github.run_number is provided by GitHub Actions itself and strictly
      # increases by 1 on every single workflow run for this repo — it can
      # never repeat or go backwards, so every push now automatically
      # produces a genuinely higher build number with zero manual steps.
      - name: Set build number from run number
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//' | tr -d '\r')
          NEW_VERSION="${BASE_VERSION}+${{ github.run_number }}"
          sed -i "s/^version:.*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "Set pubspec.yaml version to ${NEW_VERSION}"

      - name: Build Release APK
        run: flutter build apk --release

      - name: Get version
        id: ver
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '\r')
          BUILD=$(echo $VERSION | cut -d'+' -f2)
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aurum-music-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build${{ steps.ver.outputs.build }}
          name: Build ${{ steps.ver.outputs.build }}
          files: build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
