name: Build Aurum Music APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"

      - name: Update build number
        run: sed -i "s/setCurrentBuild([0-9]*)/setCurrentBuild(${{ github.run_number }})/g" lib/screens/main_shell.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Get version
        id: version
        run: |
          TAG="v1.0.0-build${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk aurum-music-${{ steps.version.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Aurum Music ${{ steps.version.outputs.tag }}"
          body: "Auto build #${{ github.run_number }}"
          files: aurum-music-${{ steps.version.outputs.tag }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurum-music-apk
          path: aurum-music-${{ steps.version.outputs.tag }}.apk
