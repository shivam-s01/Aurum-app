name: aurum_music
description: Aurum Music - Premium Gold Music Experience
publish_to: 'none'
version: 1.0.0+342

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # Audio
  # NOTE: just_audio stays as a dependency even though AurumAudioHandler is
  # gone — api_service.dart's diagnostics throwaway AudioPlayer still uses
  # it, and its LoopMode enum is reused (as a shared value type only, no
  # Player constructed) by player_provider.dart / full_player_screen.dart.
  # audio_service is REMOVED — replaced entirely by native_engine_bridge.dart
  # (NativeAudioEngine) talking to AurumAudioEngine.kt, with the
  # MediaSession/notification/background-service role now owned by
  # AurumMediaSessionService.kt (Media3-native) instead of the audio_service
  # plugin's AudioService.
  just_audio: ^0.9.40
  audio_session: ^0.1.18
  just_waveform: ^0.0.7

  # State Management
  provider: ^6.1.1

  # Payments
  flutter_cashfree_pg_sdk: ^2.4.0+52

  # HTTP
  http: ^1.2.0

  # YouTube
  youtube_explode_dart: ^2.2.1

  # UI
  scrollable_positioned_list: ^0.3.8
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  palette_generator: ^0.3.3+3
  google_fonts: ^6.2.1
  material_new_shapes: ^1.0.0
  phosphor_flutter: ^2.1.0
  expressive_loading_indicator:
    path: packages/expressive_loading_indicator

  # Persistence
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  rxdart: ^0.27.7
  uuid: ^4.3.3
  crypto: ^3.0.3
  url_launcher: ^6.3.0
  share_plus: ^10.1.2
  permission_handler: ^11.3.1
  async: ^2.11.0

  # Offline
  dio: ^5.4.0
  package_info_plus: ^4.2.0
  path_provider: ^2.1.1

  # Notifications (download progress)
  flutter_local_notifications: ^17.2.3

  # Settings features
  sensors_plus: ^5.0.1
  local_auth: ^2.3.0

  # Auth & Cloud Sync
  supabase_flutter: ^2.5.6
  app_links: 6.3.2

  # Network detection (auto Online/Offline switching)
  connectivity_plus: ^6.0.5
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
