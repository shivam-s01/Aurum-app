plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace "com.aurum.music"
    compileSdk flutter.compileSdkVersion
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
        // Required by NewPipeExtractor on minSdk < 33 (java.time / java.nio
        // APIs it uses internally aren't available on older Android
        // without desugaring).
        coreLibraryDesugaringEnabled true
    }

    buildFeatures {
        buildConfig true
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    defaultConfig {
        applicationId "com.aurum.music"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    // Per-ABI splitting — nothing is removed from the app, this only stops
    // bundling all THREE CPU architectures' native libraries (arm64-v8a,
    // armeabi-v7a, x86_64 — from ExoPlayer/Media3, NewPipeExtractor's
    // native deps, etc) into one "fat" APK. Every real device only ever
    // uses ONE of these at runtime; the other two were 100% dead weight
    // being shipped to every single install. This is the single biggest
    // lever on APK size with zero feature/behavior impact — splits.abi
    // produces one APK per architecture instead, each only containing the
    // native code that device actually needs.
    //
    // FIX: this was only a comment before — no actual `splits {}` config
    // existed, so every build still produced one fat APK with all three
    // ABIs bundled. Adding the real config now. universalApk stays true
    // so a single "works everywhere" APK is still produced for
    // sideloading/testing — the per-ABI ones are the smaller files meant
    // for normal distribution.
    splits {
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a", "x86_64"
            universalApk true
        }
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            // FIX: both were false before, so the release build shipped every
            // class + every resource, used or not (this includes AAR resources
            // pulled in by Media3/NewPipeExtractor/OkHttp that are never
            // referenced by this app). Turning these on only strips code paths
            // and resources R8/the resource shrinker can PROVE are unreachable —
            // proguard-rules.pro explicitly keeps every class this app calls
            // via reflection/platform channels/OS-instantiated services, so no
            // feature is removed, just dead weight.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Force OkHttp 4.12+ — fixes ExoPlayer "Source error code=0" on
    // Cloudflare Workers (HTTP/2) which older OkHttp versions mishandle.
    implementation("com.squareup.okhttp3:okhttp:4.12.0")

    // Media3 — required by AurumAudioEngine.kt / AurumMediaSessionService.kt
    // (Player, MediaItem, MediaSessionService, ExoPlayer, etc). Was missing
    // entirely, which is why the base class MediaSessionService couldn't be
    // resolved and every override in that file failed to compile.
    def media3Version = "1.4.1"
    implementation "androidx.media3:media3-common:$media3Version"
    implementation "androidx.media3:media3-exoplayer:$media3Version"
    implementation "androidx.media3:media3-session:$media3Version"
    implementation "androidx.media3:media3-database:$media3Version"
    implementation "androidx.media3:media3-datasource:$media3Version"

    // YouTube stream resolution — powers YoutubeInnertube.kt. Switched from
    // io.github.shabinder:youtube-api-dl-android (unmaintained since ~2022,
    // started throwing BadPageException once YouTube changed its page
    // format) to NewPipeExtractor — the same extraction library SimpMusic,
    // InnerTune, and YouMusic all use. Actively maintained (patches YouTube
    // format/cipher changes on an ongoing basis), which is the actual
    // reason those apps' playback stays stable over time.
    //
    // Using NewValve (a thin OkHttp-backed Downloader wrapper over
    // NewPipeExtractor) instead of the raw extractor artifact — it handles
    // NewPipe.init() and the Downloader implementation correctly out of
    // the box, so we don't have to hand-roll one against an undocumented
    // internal Request/Response constructor shape.
    //
    // IMPORTANT: NewValve pulls in NewPipeExtractor as SEPARATE JitPack
    // coordinates under the group "com.github.TeamNewPipe.NewPipeExtractor"
    // (note the extra ".NewPipeExtractor" — JitPack publishes EACH
    // submodule of the TeamNewPipe/NewPipeExtractor repo — "extractor",
    // "timeago-parser", "timeago-generator", etc — under this group when
    // resolved as a multi-module build). Gradle does NOT recognize any of
    // these as the same artifact as "com.github.TeamNewPipe:NewPipeExtractor"
    // (the root/aggregate coordinate used below), so
    // `resolutionStrategy.force` on the root coordinate has zero effect on
    // them, and each stale submodule ends up on the classpath alongside the
    // new one — same classes present twice, which is the
    // "Duplicate class ... found in modules" build failure. First it was
    // "extractor" (v0.24.5), then "timeago-parser" (v0.24.5) — there could
    // be more submodules NewValve depends on that haven't surfaced yet
    // since Gradle only reports duplicates it actually finds, one class at
    // a time, not the whole dependency tree up front.
    //
    // Rather than exclude submodules one at a time as each one surfaces in
    // a build failure, this excludes the ENTIRE stale group in one shot —
    // covers "extractor", "timeago-parser", and any other submodule under
    // this group NewValve might pull in, present or future.
    implementation("com.github.shalva97:NewValve:1.5") {
        exclude group: "com.github.TeamNewPipe.NewPipeExtractor"
    }

    // NewValve 1.5 (released March 2025) transitively pulls in whatever
    // NewPipeExtractor version was current back then. That old extractor
    // is EXACTLY what produces
    // "ContentNotAvailableException: The page needs to be reloaded" on
    // most/all videos — this was a real upstream bug
    // (TeamNewPipe/NewPipe#13082), and it was fixed by shipping a newer
    // extractor version (TeamNewPipe/NewPipeExtractor PR #1438, "[YouTube]
    // Fix page reload required error on streams"), not by retrying harder
    // on the client side. No amount of retry/backoff logic in
    // YoutubeInnertube.kt can work around a genuinely stale extractor —
    // it will keep failing the same way every time until the library
    // itself is updated.
    //
    // This line force-overrides NewValve's transitive NewPipeExtractor
    // dependency to a current release, so we get YouTube-format fixes
    // (including #1438) without waiting on NewValve's own release cadence
    // (NewValve has had no release since March 2025, per its GitHub
    // releases page checked 2026-07-07).
    //
    // v0.26.1 was originally used here (not the older v0.24.8) because
    // v0.24.8 PREDATES the #1438 fix for the
    // "ContentNotAvailableException: The page needs to be reloaded" bug.
    // v0.26.1 was the version the official NewPipe app itself shipped in
    // its v0.28.5 release.
    //
    // BUMPED to v0.26.3 (2026-07-07, current latest release as of 9 June
    // 2026) after diagnosing "no audio streams returned" failures on every
    // YouTube-source song: v0.26.3 contains #1508 "[YouTube] Workaround
    // SABR enforcement by using another player client" — YouTube's
    // SABR-only enforcement is exactly the "SABR protocol changes" noted
    // below (fixed in NewPipe app v0.28.8, June 2026). v0.26.1 predates
    // that fix, so every extraction attempt was hitting SABR-gated
    // responses with empty adaptiveFormats — no amount of client-side
    // retrying in YoutubeInnertube.kt could work around it, same as the
    // #1438 case above. v0.26.3 also adds #1504 (audio track type via
    // formats xTags), used incidentally by the same code path.
    //
    // Check https://github.com/TeamNewPipe/NewPipeExtractor/releases for
    // newer tags periodically — YouTube changes format often enough
    // (see e.g. the SABR protocol changes fixed in NewPipe app v0.28.8,
    // June 2026) that this version should be bumped every few months as
    // part of normal maintenance, the same way NewValve's own README
    // recommends staying current.
    //
    // (The actual "win over NewValve's transitive pin" enforcement is
    // done below via configurations.all { resolutionStrategy { force ... } }
    // — that's the only valid place to force a version in Gradle; passing
    // `force = true` inside this dependency's own configuration closure,
    // as an earlier version of this file did, fails the build with
    // "Cannot set the value of read-only property 'force'" because
    // `force` here refers to the DefaultExternalModuleDependency's
    // read-only accessor, not a settable flag.)
    implementation "com.github.TeamNewPipe:NewPipeExtractor:v0.26.3"

    // Required by coreLibraryDesugaringEnabled above.
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs_nio:2.1.4"
}

configurations.all {
    resolutionStrategy {
        // This is the correct (and only valid) way to force a specific
        // version to win dependency resolution in Gradle for same-
        // coordinate conflicts — guarantees NewValve's stale transitive
        // NewPipeExtractor pin never wins over the version declared above,
        // for the cases where it IS recognized as the same coordinate.
        //
        // NOTE: there is deliberately NO global
        // `exclude group: "com.github.TeamNewPipe.NewPipeExtractor"` here.
        // The root coordinate declared above
        // (com.github.TeamNewPipe:NewPipeExtractor:v0.26.3) very likely
        // depends on its OWN submodules (extractor, timeago-parser, etc)
        // under that exact group internally — a configurations.all-level
        // exclude applies to every configuration, including the
        // resolution of that root dependency's own transitive graph. That
        // would silently strip classes back OUT of the v0.26.1 artifact
        // we actually want, trading a build-time duplicate-class error for
        // a runtime ClassNotFoundException/NoClassDefFoundError instead —
        // a worse failure because it wouldn't show up until the app is
        // actually running. The exclude is instead scoped to ONLY
        // NewValve's dependency declaration above, which is the one place
        // that needs it.
        force "com.github.TeamNewPipe:NewPipeExtractor:v0.26.3"
    }
}
