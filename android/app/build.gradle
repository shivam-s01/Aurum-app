plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace "com.aurum.music"
    compileSdk flutter.compileSdkVersion
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    defaultConfig {
        applicationId "com.aurum.music"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
        debug {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Force OkHttp 4.12+ — fixes ExoPlayer "Source error code=0" on
    // Cloudflare Workers (HTTP/2) which older OkHttp versions mishandle.
    implementation("com.squareup.okhttp3:okhttp:4.12.0")

    // Media3 — required by AurumAudioEngine.kt / AurumMediaSessionService.kt
    // (Player, MediaItem, MediaSessionService, ExoPlayer, etc). Was missing
    // entirely, which is why the base class MediaSessionService couldn't be
    // resolved and every override in that file failed to compile.
    def media3Version = "1.4.1"
    implementation "androidx.media3:media3-common:$media3Version"
    implementation "androidx.media3:media3-exoplayer:$media3Version"
    implementation "androidx.media3:media3-session:$media3Version"
    implementation "androidx.media3:media3-database:$media3Version"
    implementation "androidx.media3:media3-datasource:$media3Version"

    // YouTube stream resolution — used by YoutubeInnertube.kt
    // (io.github.shabinder.YoutubeDownloader / AudioQuality). Available
    // directly on Maven Central, no extra repo needed.
    implementation "io.github.shabinder:youtube-api-dl-android:1.4"
}
