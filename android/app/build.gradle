plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace "com.aurum.music"
    compileSdk flutter.compileSdkVersion
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
        // Required by NewPipeExtractor on minSdk < 33 (java.time / java.nio
        // APIs it uses internally aren't available on older Android
        // without desugaring).
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    defaultConfig {
        applicationId "com.aurum.music"
        minSdk flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
        debug {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // Force OkHttp 4.12+ — fixes ExoPlayer "Source error code=0" on
    // Cloudflare Workers (HTTP/2) which older OkHttp versions mishandle.
    implementation("com.squareup.okhttp3:okhttp:4.12.0")

    // Media3 — required by AurumAudioEngine.kt / AurumMediaSessionService.kt
    // (Player, MediaItem, MediaSessionService, ExoPlayer, etc). Was missing
    // entirely, which is why the base class MediaSessionService couldn't be
    // resolved and every override in that file failed to compile.
    def media3Version = "1.4.1"
    implementation "androidx.media3:media3-common:$media3Version"
    implementation "androidx.media3:media3-exoplayer:$media3Version"
    implementation "androidx.media3:media3-session:$media3Version"
    implementation "androidx.media3:media3-database:$media3Version"
    implementation "androidx.media3:media3-datasource:$media3Version"

    // YouTube stream resolution — powers YoutubeInnertube.kt. Switched from
    // io.github.shabinder:youtube-api-dl-android (unmaintained since ~2022,
    // started throwing BadPageException once YouTube changed its page
    // format) to NewPipeExtractor — the same extraction library SimpMusic,
    // InnerTune, and YouMusic all use. Actively maintained (patches YouTube
    // format/cipher changes on an ongoing basis), which is the actual
    // reason those apps' playback stays stable over time.
    //
    // Using NewValve (a thin OkHttp-backed Downloader wrapper over
    // NewPipeExtractor) instead of the raw extractor artifact — it handles
    // NewPipe.init() and the Downloader implementation correctly out of
    // the box, so we don't have to hand-roll one against an undocumented
    // internal Request/Response constructor shape.
    implementation "com.github.shalva97:NewValve:1.5"

    // Required by coreLibraryDesugaringEnabled above.
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs_nio:2.1.4"
}
