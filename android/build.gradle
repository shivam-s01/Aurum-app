allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
    plugins.withId("com.android.library") { extensions.configure("com.android.build.gradle.LibraryExtension") { ext -> if (ext.namespace == null) { ext.namespace = project.group.toString() } } }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
